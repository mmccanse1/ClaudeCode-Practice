# Cloudflare Worker config for the Meal Planner image proxy + shared cache.
# Deploy steps are in README.md. The KV namespace id below is filled in during
# setup by `wrangler kv namespace create IMAGE_CACHE`.

name = "meal-planner-image-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Shared dish->image cache. `id` is set during setup (see README step 4).
[[kv_namespaces]]
binding = "IMAGE_CACHE"
id = "912e243e68a34e6189bbd45aea21267d"

# Secrets (GEMINI_API_KEY, optional APP_TOKEN) are NOT stored here — they are set
# with `wrangler secret put` so they never land in git. See README steps 5–6.
